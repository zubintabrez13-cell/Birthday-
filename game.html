<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jaggu's Jump Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Pangolin&display=swap" rel="stylesheet">
    <style>
        /* --- ALL CSS INCLUDED HERE --- */
        body {
            margin: 0;
            text-align: center;
            font-family: 'Pangolin', cursive;
            background: #fff0f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Crucial for Android: prevents scrolling/bouncing */
        }
        h2 { color: #ff6b9d; margin: 10px 0; font-size: 1.5rem; }
        .score { font-size: 20px; color: #ff85a2; margin-bottom: 10px; font-weight: bold; }
        
        #gameContainer {
            position: relative;
            width: 95vw;
            max-width: 500px;
            height: 250px;
            background: white;
            border: 4px solid #ffdeeb;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(255, 182, 193, 0.4);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .btn-restart {
            margin-top: 20px;
            padding: 12px 30px;
            background: #ff85a2;
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Pangolin', cursive;
            font-size: 1rem;
            display: none; /* Only shows on Game Over */
            cursor: pointer;
        }
    </style>
</head>
<body onclick="jump()"> <h2>🧸 Jaggu's Adventure</h2>
    <div class="score">Score: <span id="scoreVal">0</span> / 10</div>
    
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <button class="btn-restart" id="restartBtn" onclick="resetGame(event)">Try Again! ✨</button>
    <p id="hint" style="color: #aaa; font-size: 0.8rem; margin-top: 10px;">Tap anywhere to jump!</p>

    <script>
        /* --- ALL JAVASCRIPT INCLUDED HERE --- */
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreVal = document.getElementById("scoreVal");
        const restartBtn = document.getElementById("restartBtn");

        // Adjust canvas resolution for sharp graphics
        canvas.width = 500;
        canvas.height = 250;

        let score = 0;
        let isGameOver = false;
        let gameActive = true;

        const player = {
            x: 50, y: 180, w: 40, h: 40,
            dy: 0, jumpPower: -15, gravity: 0.8, grounded: false
        };

        const obstacle = { x: 550, y: 190, w: 35, h: 35, speed: 6 };

        function update() {
            if (!gameActive) return;

            // Physics
            player.dy += player.gravity;
            player.y += player.dy;

            // Ground Collision
            if (player.y + player.h > 220) {
                player.y = 220 - player.h;
                player.dy = 0;
                player.grounded = true;
            }

            // Obstacle Movement
            obstacle.x -= obstacle.speed;
            if (obstacle.x < -50) {
                obstacle.x = 600;
                score++;
                scoreVal.innerHTML = score;
                if (score >= 10) win();
            }

            // Hit Detection
            if (player.x < obstacle.x + obstacle.w - 5 &&
                player.x + player.w - 5 > obstacle.x &&
                player.y < obstacle.y + obstacle.h - 5 &&
                player.y + player.h > obstacle.y) {
                gameOver();
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ground Line
            ctx.strokeStyle = "#ffdeeb";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, 220);
            ctx.lineTo(500, 220);
            ctx.stroke();

            // Player (Jaggu)
            ctx.fillStyle = "#ff85a2";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "rgba(255,133,162,0.3)";
            ctx.beginPath();
            ctx.roundRect(player.x, player.y, player.w, player.h, 10);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Obstacle (Cake)
            ctx.fillStyle = "#ffb6c1";
            ctx.beginPath();
            ctx.arc(obstacle.x + 17, obstacle.y + 17, 17, 0, Math.PI * 2);
            ctx.fill();
        }

        function jump() {
            if (player.grounded && gameActive) {
                player.dy = player.jumpPower;
                player.grounded = false;
            }
        }

        function gameOver() {
            gameActive = false;
            restartBtn.style.display = "block";
            document.getElementById("hint").style.display = "none";
            
            ctx.fillStyle = "rgba(255,255,255,0.8)";
            ctx.fillRect(0,0,500,250);
            ctx.fillStyle = "#ff4e8a";
            ctx.font = "bold 30px Pangolin";
            ctx.textAlign = "center";
            ctx.fillText("Oops! Try Again? 🎀", 250, 125);
        }

        function win() {
            gameActive = false;
            ctx.fillStyle = "white";
            ctx.fillRect(0,0,500,250);
            ctx.fillStyle = "#ff4e8a";
            ctx.font = "bold 24px Pangolin";
            ctx.textAlign = "center";
            ctx.fillText("Yay! You reached 10! 🎉", 250, 110);
            ctx.fillText("Opening your surprise...", 250, 150);
            
            setTimeout(() => {
                window.location.href = "birthday.html";
            }, 2000);
        }

        function resetGame(e) {
            e.stopPropagation(); // Prevents jump() from firing when clicking restart
            location.reload();
        }

        update();
    </script>
</body>
</html>
