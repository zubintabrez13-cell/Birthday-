<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cute Birthday Game</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
padding:0;
text-align:center;
font-family:"Comic Sans MS", cursive;
background:linear-gradient(180deg,#ffd6e7,#ffeef7);
color:#ff4e8a;
}

.container{
padding:20px;
}

h2{
font-size:26px;
margin-bottom:5px;
}

p{
font-size:16px;
}

canvas{
width:95%;
max-width:500px;
height:auto;
background:white;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
margin-top:20px;
}

.jumpBtn{
margin-top:20px;
padding:15px 45px;
font-size:20px;
border:none;
border-radius:40px;
background:#ff6fae;
color:white;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.jumpBtn:active{
transform:scale(0.95);
}

.decor{
font-size:40px;
}

</style>

</head>

<body>

<div class="container">

<div class="decor">🧸🎀🌸</div>

<h2>Cute Birthday Jump Game</h2>

<p>Tap anywhere or press the button to jump 🎂</p>

<canvas id="game" width="500" height="250"></canvas>

<br>

<button class="jumpBtn" onclick="mobileJump()">Jump 🐰</button>

</div>

<script src="script.js"></script>

<script>

function mobileJump(){
document.dispatchEvent(new KeyboardEvent('keydown',{code:'Space'}))
}

document.addEventListener("touchstart",mobileJump)

</script>

</body>
</html>
