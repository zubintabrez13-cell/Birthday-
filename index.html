<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Jaggu</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
text-align:center;
color:white;
overflow-x:hidden;
background:linear-gradient(45deg,#0f2027,#203a43,#2c5364);
}

/* galaxy stars */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px,80px 80px;
opacity:0.4;
animation:moveStars 80s linear infinite;
z-index:-1;
}

@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(-2000px);}
}

/* title */

.title{
font-family:'Pacifico',cursive;
font-size:60px;
margin-top:20px;
color:#ffd1dc;
text-shadow:0 0 20px pink;
}

.subtitle{
font-size:25px;
}

/* cake */

.cake{
font-size:120px;
cursor:pointer;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

/* mario game */

#game{
width:90%;
height:220px;
border:3px dashed white;
margin:auto;
position:relative;
overflow:hidden;
border-radius:20px;
background:#1e3c72;
}

#mario{
font-size:45px;
position:absolute;
bottom:0;
left:40px;
}

#pipe{
font-size:50px;
position:absolute;
bottom:0;
right:-60px;
animation:pipeMove 3s infinite linear;
}

@keyframes pipeMove{
0%{right:-60px}
100%{right:100%}
}

/* jump */

.jump{
animation:jump 0.6s;
}

@keyframes jump{
0%{bottom:0}
50%{bottom:100px}
100%{bottom:0}
}

/* confetti */

.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall 3s linear;
}

@keyframes fall{
0%{transform:translateY(0)}
100%{transform:translateY(100vh)}
}

</style>
</head>

<body>

<div class="title">🎉 Happy Birthday Jaggu 🎉</div>
<div class="subtitle">Independent Girl – Keep Shining ✨</div>

<div class="cake" onclick="confetti()">🎂</div>

<p>Click cake for celebration 🎊</p>

<h2>🎮 Mario Birthday Game</h2>
<p>Press SPACE to jump</p>

<div id="game">

<div id="mario">🧑‍🔧</div>

<div id="pipe">🧱</div>

</div>

<h3 id="score">Score: 0</h3>

<script>

let mario=document.getElementById("mario")
let pipe=document.getElementById("pipe")
let score=0

document.addEventListener("keydown",function(e){

if(e.code=="Space"){
jump()
}

})

function jump(){

if(mario.classList!="jump"){
mario.classList.add("jump")

setTimeout(function(){
mario.classList.remove("jump")
},600)

}

}

/* game loop */

setInterval(function(){

let marioTop=parseInt(window.getComputedStyle(mario).getPropertyValue("bottom"))

let pipeLeft=parseInt(window.getComputedStyle(pipe).getPropertyValue("right"))

if(pipeLeft>450 && pipeLeft<500 && marioTop<40){

alert("Game Over 🎮 Score: "+score)

score=0

}

else{

score++
document.getElementById("score").innerHTML="Score: "+score

}

},10)

/* confetti */

function confetti(){

for(let i=0;i<120;i++){

let c=document.createElement("div")

c.classList.add("confetti")

c.style.left=Math.random()*100+"vw"
c.style.background=`hsl(${Math.random()*360},100%,50%)`

document.body.appendChild(c)

setTimeout(()=>c.remove(),3000)

}

}

</script>

</body>
</html>
