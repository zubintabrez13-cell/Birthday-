<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaggu's Birthday Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Pangolin&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Pangolin', cursive;
            background: linear-gradient(135deg, #fff0f6 0%, #ffdeeb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Floating Hearts Background */
        .hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            color: #ff85a2;
            opacity: 0.6;
            animation: floatUp 6s ease-in infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Main Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 40px;
            border: 4px solid #ffffff;
            box-shadow: 0 15px 35px rgba(255, 107, 157, 0.2);
            text-align: center;
            z-index: 10;
            width: 80%;
            max-width: 350px;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #ff4e8a;
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        p {
            color: #ff85a2;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .teddy-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            display: block;
            animation: wiggle 2s infinite ease-in-out;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sparkling Button */
        button {
            background: #ff6b9d;
            color: white;
            border: none;
            padding: 15px 45px;
            font-family: 'Pangolin', cursive;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: scale(1.05);
            background: #ff4e8a;
            box-shadow: 0 10px 25px rgba(255, 107, 157, 0.6);
        }

        button:active {
            transform: scale(0.95);
        }

        .sparkle {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="hearts" id="heart-container"></div>

    <div class="glass-card">
        <span class="teddy-icon">🧸</span>
        <h1>Jaggu's Birthday Universe</h1>
        <p>A magical space created just for you! ✨</p>
        
        <button onclick="enterWorld()">Enter ✨</button>
    </div>

    <script>
        // Create floating hearts dynamically
        const heartContainer = document.getElementById('heart-container');
        const emojis = ['💖', '🌸', '✨', '🍭', '🎀'];

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
            
            heartContainer.appendChild(heart);

            // Remove heart after animation ends to keep the site fast
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        // Generate hearts every 500ms
        setInterval(createHeart, 500);

        function enterWorld() {
            // Small delay for the click effect
            setTimeout(() => {
                window.location.href = "game.html";
            }, 200);
        }
    </script>
</body>
</html>
