<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Jaggu</title>

<style>

body{
margin:0;
text-align:center;
font-family:Arial;
background:linear-gradient(45deg,#ff758c,#ff7eb3);
color:white;
overflow:hidden;
}

.name{
font-size:10vw;
font-weight:bold;
margin-top:20px;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white,0 0 20px pink;}
to{ text-shadow:0 0 20px yellow,0 0 40px orange;}
}

.cake{
font-size:20vw;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

.gift{
font-size:18vw;
cursor:pointer;
}

#message{
display:none;
font-size:4vw;
padding:20px;
}

/* balloons */

.balloon{
position:absolute;
bottom:-150px;
font-size:40px;
animation:float 10s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* GAME */

#gameArea{
width:90%;
height:250px;
margin:auto;
border:3px dashed white;
position:relative;
border-radius:20px;
}

#cakeGame{
position:absolute;
font-size:50px;
cursor:pointer;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<div class="name">🎉 Jaggu 🎉</div>

<h2>Happy Birthday</h2>

<div class="cake">🎂</div>

<p>Click the gift 🎁</p>

<div class="gift" onclick="showMessage()">🎁</div>

<div id="message">

Happy Birthday pyari Jaggu ❤️  
Wish you success, happiness and all dreams come true 🎉

</div>

<!-- balloons -->

<div class="balloon" style="left:10%">🎈</div>
<div class="balloon" style="left:40%">🎈</div>
<div class="balloon" style="left:70%">🎈</div>

<h2>🎮 Catch the Cake Game</h2>

Score: <span id="score">0</span>

<div id="gameArea">
<div id="cakeGame">🎂</div>
</div>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<canvas id="fireworks"></canvas>

<script>

/* message */

function showMessage(){
document.getElementById("message").style.display="block";
}

/* GAME */

let score = 0;
const cake = document.getElementById("cakeGame");
const gameArea = document.getElementById("gameArea");

function moveCake(){

let x = Math.random() * (gameArea.clientWidth - 60);
let y = Math.random() * (gameArea.clientHeight - 60);

cake.style.left = x + "px";
cake.style.top = y + "px";

}

cake.onclick = function(){

score++;
document.getElementById("score").innerText = score;

if(score == 10){
alert("🎉 Happy Birthday Jaggu! You win!");
}

moveCake();

};

setInterval(moveCake,1200);

/* fireworks */

const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];

function createFirework(){

for(let i=0;i<60;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:100

});

}

}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{

p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.fillStyle="white";
ctx.fillRect(p.x,p.y,3,3);

if(p.life<=0){

particles.splice(i,1);

}

});

requestAnimationFrame(update);

}

setInterval(createFirework,900);

update();

</script>

</body>
</html>
